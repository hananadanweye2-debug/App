<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duas Library</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Amiri&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#f8fafc;
}

.app{
    max-width:700px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
    margin-bottom:10px;
}

label{
    font-weight:600;
    color:#1e293b;
}

select{
    width:100%;
    padding:6px 10px;
    border:1px solid #cbd5e1;
    font-size:14px;
    margin-top:8px;
}

.card{
    background:white;
    padding:25px;
    border-radius:18px;
    margin-top:20px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.label{
    font-weight:600;
    margin-top:18px;
    color:#1e293b;
}

.arabic{
    font-family:'Amiri', serif;
    font-size:26px;
    direction:rtl;
    text-align:center;
    line-height:2;
    margin:20px 0;
}

.divider{
    height:1px;
    background:#e2e8f0;
    margin:15px 0;
}

.latin{
    font-style:italic;
    color:#64748b;
}

.english{
    color:#334155;
    margin-top:5px;
}

ul{
    padding-left:18px;
}

#playBtn{
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:600;
    cursor:pointer;
    width:100%;
    transition:0.2s;
}

#playBtn:hover{
    background:#1e40af;
}

.fav-btn{
    font-size:22px;
    border:none;
    background:none;
    cursor:pointer;
    transition:0.2s;
}

.fav-btn:hover{
    transform:scale(1.2); 
}
</style>
</head>

<body>

<div class="app">

<h2>🤲 Duas Library</h2>

<label>Category</label>

<select id="duaSelect" onchange="showDua()"></select>

<div id="duaDisplay"></div>

</div>

<script>

const duaSelect = document.getElementById("duaSelect");
const duaDisplay = document.getElementById("duaDisplay");

const duas = [

[
"Before Sleep",
`بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا`,
`Bismika Allahumma amootu wa ahya`,
`In Your name, O Allah, I die and I live.`,
["This dua helps you sleep with remembrance of Allah and brings peace and protection through the night."],
"audio/before-sleep.mp3"
],

[
"Waking Up",
`الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ`,
`Alhamdu lillahil-ladhi ahyana ba‘da ma amatana wa ilayhin-nushoor`,
`All praise is for Allah who gave us life after having taken it from us, and to Him is the resurrection.`,
["This dua reminds you to be grateful to Allah for life and start your day with remembrance."],
"audio/waking-up.mp3"
],

[
"Before Eating",
`اللَّهُمَّ بَارِكْ لَنَا فِيمَا رَزَقْتَنَا وَقِنَا عَذَابَ النَّارِ`,
`Allahumma barik lana fima razaqtana wa qina ‘adhaban-nar`,
`O Allah, bless what You have provided us and protect us from the punishment of the Fire.`,
["This dua brings blessings to your food and reminds you to be grateful for Allah’s provision."],
"audio/before-eating.mp3"
],

[
"After Eating",
`الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنِي هَذَا وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلَا قُوَّةٍ`,
`Alhamdulillahil-ladhi at‘amani hadha wa razaqanihi min ghayri hawlin minni wa la quwwah`,
`All praise is for Allah who fed me this and provided it for me without any power or strength from me.`,
["This dua increases gratitude and reminds you that all provision comes from Allah."],
"audio/after-eating.mp3"
]

];

/* Populate dropdown */

duas.forEach((d,i)=>{

    let opt=document.createElement("option");

    opt.value=i;

    opt.textContent=d[0];

    duaSelect.appendChild(opt);

});

/* Favorites */

function toggleFavorite(index){

    let favs = JSON.parse(localStorage.getItem("favorites")) || [];

    if(favs.includes(index)){

        favs = favs.filter(f=>f!==index);

    } else {

        favs.push(index);

    }

    localStorage.setItem("favorites", JSON.stringify(favs));

    showDua();
}

function isFavorite(index){

    let favs = JSON.parse(localStorage.getItem("favorites")) || [];

    return favs.includes(index);
}

/* Show Dua */

function showDua(){

    let i = duaSelect.value;

    let d = duas[i];

    let favIcon = isFavorite(Number(i)) ? "★" : "☆";

    duaDisplay.innerHTML = `
    <div class="card">

        <div class="top-bar">

            <span class="label">${d[0]}</span>

            <button class="fav-btn"
            onclick="toggleFavorite(${i})">

            ${favIcon}

            </button>

        </div>

        <div class="arabic">${d[1]}</div>

        <div class="divider"></div>

        <div class="label">Transliteration</div>

        <div class="latin">${d[2]}</div>

        <div class="label">English</div>

        <div class="english">${d[3]}</div>

        <div class="label">Benefits</div>

        <ul>

        ${d[4].map(b=>`<li>${b}</li>`).join("")}

        </ul>

        <button onclick="toggleAudio()" id="playBtn">

        ▶ Play Real Audio

        </button>

    </div>
    `;
}

/* REAL HUMAN AUDIO */

let currentAudio = null;

function toggleAudio(){

    const btn = document.getElementById("playBtn");

    // stop if already playing
    if(currentAudio && !currentAudio.paused){

        currentAudio.pause();

        currentAudio.currentTime = 0;

        btn.innerText = "▶ Play Real Audio";

        return;
    }

    // get selected dua audio
    const audioSrc = duas[duaSelect.value][5];

    // create audio
    currentAudio = new Audio(audioSrc);

    // play
    currentAudio.play();

    btn.innerText = "⏹ Stop Audio";

    // when finished
    currentAudio.onended = ()=>{

        btn.innerText = "▶ Play Real Audio";

    };
}

showDua();

</script>

</body>
</html>
