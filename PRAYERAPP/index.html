</div>


<!-- MAIN APP -->

  <div class="header">

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="panel">

  <div class="panel-header">

  <div class="panel-item" onclick="alert('Language system coming next')">

  </div>

  </div>

  <hr>

  <div class="panel-item" onclick="shareApp()">📤 Share App</div>
  <div class="panel-item" onclick="rateApp()">⭐ Rate Us</div>
  <div class="panel-item" onclick="alert('About page')">ℹ️ About</div>
  <div class="panel-item" onclick="alert('Help page')">❓ Help</div>

</div>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Amiri&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', Arial, sans-serif;
    background: #f8fafc;
    margin: 0;
}
.card {
  font-size: 15px;
  font-weight: 700;
}
</style>

<script>

/* ---------------- MENU ---------------- */

function toggleMenu() {
  const menu = document.getElementById("dropdownMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", function(e) {
  const menu = document.getElementById("dropdownMenu");
  const icon = document.querySelector(".menu-icon");

  if (!icon.contains(e.target) && !menu.contains(e.target)) {
    menu.style.display = "none";
  }
});

/* ---------------- SETTINGS PANEL ---------------- */

function openSettings() {
  window.location.href = "settings.html";
}

function closeSettings() {
  document.getElementById("settingsPanel").classList.remove("active");
}

/* ---------------- ACTIONS ---------------- */

function shareApp() {
  const url = "https://your-app-link.com";

  if (navigator.share) {
    navigator.share({
      title: "Deen Companion",
      text: "Check this Islamic app 🕌",
      url: url
    });
  } else {
    alert("Sharing not supported");
  }
}

function rateApp() {
  alert("Redirect to Play Store / rating page");
}
/* ---------------- SERVICE WORKER ---------------- */

if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register("/sw.js")
    .then(() => {
      console.log("Service Worker Registered");
    });

}

/* ---------------- ENABLE NOTIFICATIONS ---------------- */

async function enableNotifications() {

  const permission = await Notification.requestPermission();

  if (permission === "granted") {
    alert("Notifications Enabled ✅");
  }

}

/* ---------------- TEST NOTIFICATION ---------------- */

async function sendMorningAdhkar() {

  const registration = await navigator.serviceWorker.ready;

  registration.active.postMessage({
    type: "MORNING_ADHKAR"
  });

}
</script>

</body>
</html>
