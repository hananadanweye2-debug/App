<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tasbeeh Counter</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Amiri&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #f1f5f9, #e2e8f0);
    font-family: 'Poppins', sans-serif;
    user-select: none;
}

.app {
    width: 340px;
    height: 620px;
    background: white;
    border-radius: 35px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
}

.top {
    text-align: center;
    color: #1e293b;
}

.title {
    font-size: 16px;
    font-weight: 600;
}

.dhikr-ar {
    font-family: 'Amiri', serif;
    font-size: 24px;
    margin-top: 10px;
}

.dhikr-en {
    font-size: 13px;
    opacity: 0.7;
}

.center {
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
}

.counter {
    width: 220px;
    height: 260px;
    background: linear-gradient(145deg, #e2e8f0, #cbd5e1);
    border-radius: 50% 50% 45% 45%;
    position: relative;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    cursor: pointer;
}

.screen {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 50px;
    background: #bbf7d0;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    color: #065f46;
}

.main-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 90px;
    background: radial-gradient(circle, #3b82f6, #1e40af);
    border-radius: 50%;
}

.bottom {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 5px;
}

button {
    background: #e2e8f0;
    border: none;
    padding: 8px 10px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}

.daily {
    text-align: center;
    font-size: 14px;
    margin-top: 5px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="app">

    <div class="top">
        <div class="title">Tasbeeh Counter</div>
        <div class="dhikr-ar" id="dhikrAr"></div>
        <div class="dhikr-en" id="dhikrEn"></div>
        <div class="daily">Today: <span id="daily">0</span></div>
    </div>

    <div class="center">
        <div class="counter" onclick="tap()">
            <div class="screen" id="count">0</div>
            <div class="main-btn"></div>
        </div>
    </div>

    <div class="bottom">
        <button onclick="reset()">⟲ Reset</button>
        <button onclick="undo()">↶ Undo</button>
        <button onclick="nextDua()">☰ Next Dua</button>
        <button onclick="toggleReminder()">🔔 Reminder</button>
    </div>

</div>

<script>

/* 📿 DHIKR LIST */
let dhikrList = [
    {
        ar: "سُبْحَانَ ٱللَّٰهِ",
        en: "Glory be to Allah"
    },
    {
        ar: "ٱلْحَمْدُ لِلَّٰهِ",
        en: "All praise is due to Allah"
    },
    {
        ar: "ٱللَّٰهُ أَكْبَرُ",
        en: "Allah is the Greatest"
    },
    {
        ar: "لَا إِلَٰهَ إِلَّا ٱللَّٰهُ",
        en: "There is no god but Allah"
    },
    {
        ar: "أَسْتَغْفِرُ ٱللَّٰهَ",
        en: "I seek forgiveness from Allah"
    },
    {
        ar: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",
        en: "Glory and praise be to Allah"
    },
    {
        ar: "سُبْحَانَ اللَّهِ الْعَظِيمِ",
        en: "Glory be to Allah the Great"
    },
    {
        ar: "اللّهُمَّ صَلِّ عَلَى مُحَمَّدٍ",
        en: "Send blessings upon Muhammad"
    },
    {
        ar: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ",
        en: "No power except with Allah"
    },
    {
        ar: "حَسْبِيَ اللَّهُ وَنِعْمَ الْوَكِيلُ",
        en: "Allah is sufficient for me"
    },
    {
        ar: "اللَّهُمَّ اغْفِرْ لِي",
        en: "O Allah forgive me"
    },
    {
        ar: "اللَّهُمَّ ارْحَمْنِي",
        en: "O Allah have mercy on me"
    },
    {
        ar: "اللَّهُمَّ اهْدِنِي",
        en: "O Allah guide me"
    },
    {
        ar: "رَبِّ اغْفِرْ لِي",
        en: "My Lord forgive me"
    },
    {
        ar: "رَبِّ زِدْنِي عِلْمًا",
        en: "Increase me in knowledge"
    },
    {
        ar: "اللَّهُمَّ عَافِنِي",
        en: "O Allah grant me health"
    },
    {
        ar: "اللَّهُمَّ ارْزُقْنِي",
        en: "O Allah provide for me"
    },
    {
        ar: "اللَّهُمَّ ثَبِّتْنِي",
        en: "O Allah keep me firm"
    },
    {
        ar: "اللَّهُمَّ تُبْ عَلَيَّ",
        en: "O Allah accept my repentance"
    },
    {
        ar: "اللَّهُمَّ اجْعَلْنِي مِنَ الصَّالِحِينَ",
        en: "Make me among the righteous"
    }
];


let index = 0;
let count = 0;

/* DAILY */
const todayKey = "dhikr_" + new Date().toDateString();
let daily = parseInt(localStorage.getItem(todayKey)) || 0;

const countEl = document.getElementById("count");
const arEl = document.getElementById("dhikrAr");
const enEl = document.getElementById("dhikrEn");
const dailyEl = document.getElementById("daily");

function updateDhikr(){
    arEl.innerText = dhikrList[index].ar;
    enEl.innerText = dhikrList[index].en;
    dailyEl.innerText = daily;
}

/* TAP */
function tap(){
    count++;
    daily++;

    countEl.innerText = count;
    dailyEl.innerText = daily;

    localStorage.setItem(todayKey, daily);

    if(navigator.vibrate) navigator.vibrate(20);
}

/* RESET */
function reset(){
    count = 0;
    daily = 0;

    countEl.innerText = 0;
    dailyEl.innerText = 0;

    localStorage.setItem(todayKey, 0);
}

/* UNDO */
function undo(){
    if(count > 0) count--;
    if(daily > 0) daily--;

    countEl.innerText = count;
    dailyEl.innerText = daily;

    localStorage.setItem(todayKey, daily);
}

/* NEXT DUA */
function nextDua(){
    index = (index + 1) % dhikrList.length;
    count = 0;
    updateDhikr();
}

/* 🔔 NOTIFICATIONS */
let reminderOn = false;

if ("Notification" in window && Notification.permission !== "granted") {
    Notification.requestPermission();
}

function sendReminder(){
    if(!reminderOn) return;

    if(Notification.permission === "granted"){
        new Notification("🕋 Tasbeeh Reminder", {
            body: "Don’t forget your dhikr 🤲"
        });
    }
}

function toggleReminder(){
    reminderOn = !reminderOn;
    alert(reminderOn ? "Reminder ON 🔔" : "Reminder OFF 🔕");
}

/* every 30 minutes */
setInterval(() => {
    sendReminder();
}, 1000 * 60 * 30);

updateDhikr();

</script>

</body>
</html>
